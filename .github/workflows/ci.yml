name: Build & Test CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: pip install cryptography

      - name: Build Project
        run: |
          mkdir build
          cd build
          cmake ..
          make

      - name: Run Server and Test
        env:
          SSTD_HOST: ${{ secrets.HOST }}
          SSTD_PORT: ${{ secrets.PORT }}
        run: |
          cd build
          ./SST_Demon &
          SERVER_PID=$!
          cd ..
          sleep 2
          python test/test_multi_client.py
          kill -SIGTERM $SERVER_PID